<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Cart</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/ShoppingCart.mjs" type="module"></script>
  </head>
  <body>
    <header id="main-header" class="divider"></header>

    <!-- ─── CART MAIN CONTENT ─── -->
    <main class="cart-page divider">
      <h1 class="cart-page-title">Your Cart</h1>
      <p class="cart-item-count" id="cart-item-count">0 items in your cart</p>

      <div class="cart-layout" id="cart-layout">
        <!-- Cart items (left) -->
        <div class="cart-items" id="cart-items">
          <!-- Populated dynamically by JavaScript -->
        </div>

        <!-- Order summary (right) -->
        <aside class="order-summary" id="order-summary">
          <h2>Order Summary</h2>
          <div class="summary-row">
            <span class="label">Subtotal</span>
            <span class="value" id="summary-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span class="label">Shipping</span>
            <span class="value" id="summary-shipping">—</span>
          </div>
          <div class="summary-row">
            <span class="label">Tax (est.)</span>
            <span class="value" id="summary-tax">$0.00</span>
          </div>
          <div class="summary-row summary-row--total">
            <span class="label">Total</span>
            <span class="value" id="summary-total">$0.00</span>
          </div>
          <div class="summary-free-shipping" id="summary-free-shipping"></div>

          <div class="promo-input-row">
            <input
              type="text"
              class="promo-input"
              id="promo-input"
              placeholder="Promo code"
            />
            <button class="promo-apply-btn" id="promo-apply-btn">Apply</button>
          </div>

          <button class="btn-checkout" id="btn-checkout">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path
                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"
              />
            </svg>
            Proceed to Checkout
          </button>
          <div class="checkout-security">
            🔒 Secure checkout — SSL encrypted
          </div>
          <a href="../index.html" class="btn-continue-link"
            >← Continue Shopping</a
          >
        </aside>
      </div>
    </main>

    <!-- Global Toast Notification Element -->
    <div class="cart-toast" id="cart-toast">
      <span id="cart-toast-msg">Item removed</span>
    </div>

    <footer id="main-footer"></footer>
  </body>
</html>
