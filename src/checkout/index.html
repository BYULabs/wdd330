<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/checkout.js" type="module"></script>
  </head>
  <body>
    <header id="main-header" class="divider"></header>

    <main class="cart-page divider">
      <h1 class="cart-page-title">Checkout</h1>

      <div class="cart-layout">
        <!-- Checkout Form (Left Column) -->
        <form id="checkout-form" class="checkout-form">
          <fieldset>
            <legend>Customer Name</legend>
            <div class="form-row">
              <div class="form-group">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname" value="John" required />
              </div>
              <div class="form-group">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lname" value="Doe" required />
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Address</legend>
            <div class="form-group">
              <label for="street">Street Address</label>
              <input type="text" id="street" name="street" value="123 Main" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" value="Rexburg" required />
              </div>
              <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" value="ID" required />
              </div>
              <div class="form-group">
                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" value="83440" required />
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <div class="form-group">
              <label for="cardNumber">Credit Card Number</label>
              <input
                type="text"
                id="cardNumber"
                name="cardNumber"
                value="1234123412341234"
                required
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="expiration">Expiration Date</label>
                <input
                  type="text"
                  id="expiration"
                  name="expiration"
                  value="08/28"
                  required
                />
              </div>
              <div class="form-group">
                <label for="code">Security Code</label>
                <input type="text" id="code" name="code" value="123" required />
              </div>
            </div>
          </fieldset>

          <button type="submit" class="btn-checkout" id="btn-submit">
            Checkout
          </button>
        </form>

        <!-- Order Summary Section (Right Column) -->
        <aside class="order-summary" id="order-summary">
          <h2>Order Summary</h2>
          <div class="summary-row">
            <span class="label">Subtotal</span>
            <span class="value" id="summary-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span class="label">Shipping Estimate</span>
            <span class="value" id="summary-shipping">—</span>
          </div>
          <div class="summary-row">
            <span class="label">Tax (6%)</span>
            <span class="value" id="summary-tax">$0.00</span>
          </div>
          <div class="summary-row summary-row--total">
            <span class="label">Order Total</span>
            <span class="value" id="summary-total">$0.00</span>
          </div>
        </aside>
      </div>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
